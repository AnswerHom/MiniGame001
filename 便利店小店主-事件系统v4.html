<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>便利店小店主 - v4 事件系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .game-container {
            max-width: 1200px;
            margin: 0 auto;
            background: linear-gradient(180deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        /* 场景区域 */
        .scene {
            position: relative;
            height: 400px;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F7FA 50%, #8BC34A 50%, #689F38 100%);
            border-bottom: 4px solid #795548;
            overflow: hidden;
        }

        /* 店铺建筑 */
        .shop {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 200px;
            background: linear-gradient(180deg, #FF9800 0%, #F57C00 100%);
            border-radius: 10px 10px 0 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .shop::before {
            content: '🏪';
            position: absolute;
            top: -60px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 80px;
        }

        .shop-window {
            position: absolute;
            top: 20px;
            left: 10%;
            width: 25%;
            height: 60px;
            background: linear-gradient(180deg, #81D4FA 0%, #4FC3F7 100%);
            border: 4px solid #5D4037;
            border-radius: 5px;
        }

        .shop-window:nth-child(2) {
            left: 65%;
        }

        /* 货架区 */
        .shelf-area {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
        }

        .shelf {
            width: 120px;
            height: 80px;
            background: linear-gradient(180deg, #8D6E63 0%, #6D4C41 100%);
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .shelf-items {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            justify-content: center;
        }

        .shelf-item {
            width: 25px;
            height: 25px;
            border-radius: 3px;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 收银台 */
        .counter {
            position: absolute;
            bottom: 0;
            right: 50px;
            width: 100px;
            height: 60px;
            background: linear-gradient(180deg, #795548 0%, #5D4037 100%);
            border-radius: 5px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .counter::before {
            content: '🛒';
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 30px;
        }

        /* 顾客排队区 */
        .queue-area {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 100px;
            background: rgba(255,255,255,0.8);
            border-radius: 10px;
            border: 3px dashed #795548;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .queue-label {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            background: #795548;
            color: white;
            padding: 5px 15px;
            border-radius: 5px;
            font-size: 14px;
            white-space: nowrap;
        }

        /* 顾客 */
        .customer {
            position: absolute;
            width: 40px;
            height: 60px;
            background: linear-gradient(180deg, #FFCC80 0%, #FFB74D 100%);
            border-radius: 20px 20px 10px 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: all 0.5s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .customer.vip {
            background: linear-gradient(180deg, #E1BEE7 0%, #CE93D8 100%);
        }

        .customer.urgent {
            background: linear-gradient(180deg, #FFCCBC 0%, #FFAB91 100%);
        }

        .customer-name {
            position: absolute;
            top: -25px;
            font-size: 12px;
            white-space: nowrap;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 2px 8px;
            border-radius: 3px;
        }

        /* 排队线 */
        .queue-line {
            position: absolute;
            bottom: 10px;
            left: 10px;
            right: 10px;
            height: 2px;
            background: repeating-linear-gradient(
                90deg,
                #795548,
                #795548 10px,
                transparent 10px,
                transparent 20px
            );
        }

        /* 顶部状态栏 */
        .stats-bar {
            background: white;
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            border-bottom: 3px solid #e0e0e0;
        }

        .stat-box {
            text-align: center;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .stat-icon {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
        }

        /* 商品管理区 */
        .products-section {
            padding: 20px;
            background: white;
        }

        .section-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .product-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            border-radius: 15px;
            color: white;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .product-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .product-stock {
            font-size: 14px;
            opacity: 0.9;
        }

        .product-price {
            font-size: 20px;
            font-weight: bold;
            margin: 10px 0;
        }

        .product-controls {
            display: flex;
            gap: 5px;
            margin-top: 10px;
        }

        .btn {
            padding: 8px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.2s;
        }

        .btn-up {
            background: #4CAF50;
            color: white;
        }

        .btn-up:hover {
            background: #45a049;
        }

        .btn-down {
            background: #f44336;
            color: white;
        }

        .btn-down:hover {
            background: #da190b;
        }

        .btn-add {
            background: #2196F3;
            color: white;
            width: 100%;
            margin-top: 10px;
        }

        .btn-add:hover {
            background: #0b7dda;
        }

        /* 升级区 */
        .upgrades-section {
            padding: 20px;
            background: #f8f9fa;
        }

        .upgrades-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .upgrade-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .upgrade-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .upgrade-name {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .upgrade-level {
            font-size: 24px;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .upgrade-cost {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
        }

        .btn-upgrade {
            background: #FF9800;
            color: white;
            width: 100%;
            padding: 12px;
            font-size: 16px;
        }

        .btn-upgrade:hover {
            background: #F57C00;
        }

        /* 消息提示 */
        .message {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            z-index: 1000;
        }

        .message.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .message.hide {
            opacity: 0;
            transform: translateX(-50%) translateY(-20px);
        }

        /* 事件通知栏 */
        .event-notification-bar {
            position: fixed;
            top: 80px;
            right: 20px;
            background: white;
            padding: 15px 20px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: none;
            z-index: 999;
            max-width: 300px;
        }

        .event-notification-bar.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .event-notification-bar .event-icon {
            font-size: 30px;
            margin-bottom: 10px;
        }

        .event-notification-bar .event-title {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .event-notification-bar .event-description {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }

        .event-notification-bar .event-timer {
            font-size: 12px;
            color: #999;
        }

        /* 事件详情对话框 */
        .event-dialog {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1001;
        }

        .event-dialog.show {
            display: flex;
        }

        .event-dialog-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .event-dialog-content .event-type {
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .event-dialog-content .event-icon {
            font-size: 50px;
            margin-bottom: 20px;
        }

        .event-dialog-content .event-title {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }

        .event-dialog-content .event-description {
            font-size: 16px;
            color: #666;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .event-dialog-content .event-effects {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .event-dialog-content .event-effects h4 {
            font-size: 14px;
            color: #333;
            margin-bottom: 10px;
        }

        .event-dialog-content .event-effects ul {
            list-style: none;
            padding: 0;
        }

        .event-dialog-content .event-effects li {
            padding: 5px 0;
            color: #666;
        }

        .event-dialog-content .event-strategies {
            margin-bottom: 20px;
        }

        .event-dialog-content .event-strategies h4 {
            font-size: 14px;
            color: #333;
            margin-bottom: 10px;
        }

        .event-dialog-content .event-strategies .strategy-item {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .event-dialog-content .event-strategies .strategy-item:hover {
            background: #e9ecef;
        }

        .event-dialog-content .event-strategies .strategy-name {
            font-weight: bold;
            color: #333;
        }

        .event-dialog-content .event-strategies .strategy-cost {
            font-size: 12px;
            color: #666;
        }

        .event-dialog-content .event-buttons {
            display: flex;
            gap: 10px;
        }

        .event-dialog-content .btn {
            flex: 1;
            padding: 12px;
            font-size: 16px;
        }

        .event-dialog-content .btn-close {
            background: #6c757d;
            color: white;
        }

        .event-dialog-content .btn-auto {
            background: #28a745;
            color: white;
        }

        .event-dialog-content .btn-auto:hover {
            background: #218838;
        }

        /* 事件日志 */
        .event-log {
            position: fixed;
            top: 80px;
            left: 20px;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 250px;
            max-height: 400px;
            overflow-y: auto;
            z-index: 998;
        }

        .event-log h4 {
            font-size: 14px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .event-log .event-log-item {
            padding: 8px;
            border-radius: 5px;
            margin-bottom: 8px;
            font-size: 12px;
        }

        .event-log .event-log-item.regular {
            background: #e3f2fd;
            border-left: 3px solid #2196F3;
        }

        .event-log .event-log-item.special {
            background: #fff3e0;
            border-left: 3px solid #FF9800;
        }

        .event-log .event-log-item.challenge {
            background: #ffebee;
            border-left: 3px solid #f44336;
        }

        .event-log .event-log-item .event-name {
            font-weight: bold;
            color: #333;
            margin-bottom: 3px;
        }

        .event-log .event-log-item .event-time {
            color: #999;
        }

        /* 滚动条样式 */
        .event-log::-webkit-scrollbar {
            width: 6px;
        }

        .event-log::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 3px;
        }

        .event-log::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 3px;
        }

        .event-log::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* 游戏说明 */
        .game-info {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 14px;
            background: white;
            border-top: 3px solid #e0e0e0;
        }

        /* 动画 */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .animate-bounce {
            animation: bounce 0.5s ease;
        }

        .animate-fadeIn {
            animation: fadeIn 0.3s ease;
        }

        .animate-slideInRight {
            animation: slideInRight 0.3s ease;
        }

        .animate-shake {
            animation: shake 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="message" id="message">游戏开始！调整价格、进货、升级设施</div>

    <!-- 事件通知栏 -->
    <div class="event-notification-bar" id="eventNotificationBar">
        <div class="event-icon" id="eventIcon"></div>
        <div class="event-title" id="eventTitle"></div>
        <div class="event-description" id="eventDescription"></div>
        <div class="event-timer" id="eventTimer"></div>
    </div>

    <!-- 事件详情对话框 -->
    <div class="event-dialog" id="eventDialog">
        <div class="event-dialog-content">
            <div class="event-type" id="eventType"></div>
            <div class="event-icon" id="eventDialogIcon"></div>
            <div class="event-title" id="eventDialogTitle"></div>
            <div class="event-description" id="eventDialogDescription"></div>
            <div class="event-effects">
                <h4>事件影响：</h4>
                <ul id="eventEffects"></ul>
            </div>
            <div class="event-strategies">
                <h4>应对策略：</h4>
                <div id="eventStrategies"></div>
            </div>
            <div class="event-buttons">
                <button class="btn btn-close" onclick="closeEventDialog()">关闭</button>
                <button class="btn btn-auto" onclick="applyAutoStrategy()">自动解决</button>
            </div>
        </div>
    </div>

    <!-- 事件日志 -->
    <div class="event-log" id="eventLog">
        <h4>
            📋 事件日志
            <span id="eventLogCount" style="font-size: 12px; font-weight: normal; color: #666;">0</span>
        </h4>
        <div id="eventLogItems"></div>
    </div>

    <div class="game-container">
        <!-- 场景区域 -->
        <div class="scene">
            <div class="shop">
                <div class="shop-window"></div>
                <div class="shop-window"></div>
                <div class="shelf-area">
                    <div class="shelf" id="shelf1"></div>
                    <div class="shelf" id="shelf2"></div>
                    <div class="shelf" id="shelf3"></div>
                </div>
                <div class="counter"></div>
            </div>
            <div class="queue-area" id="queueArea">
                <div class="queue-label">排队区</div>
                <div class="queue-line"></div>
            </div>
        </div>

        <!-- 状态栏 -->
        <div class="stats-bar">
            <div class="stat-box">
                <div class="stat-icon">💰</div>
                <div class="stat-value" id="gold">100</div>
                <div class="stat-label">金币</div>
            </div>
            <div class="stat-box">
                <div class="stat-icon">📦</div>
                <div class="stat-value" id="revenue">0</div>
                <div class="stat-label">营业额</div>
            </div>
            <div class="stat-box">
                <div class="stat-icon">⭐</div>
                <div class="stat-value" id="level">1</div>
                <div class="stat-label">等级</div>
            </div>
            <div class="stat-box">
                <div class="stat-icon">👥</div>
                <div class="stat-value" id="queueLength">0</div>
                <div class="stat-label">排队人数</div>
            </div>
        </div>

        <!-- 商品管理 -->
        <div class="products-section">
            <div class="section-title">🛒 商品管理</div>
            <div class="products-grid" id="productsGrid"></div>
        </div>

        <!-- 设施升级 -->
        <div class="upgrades-section">
            <div class="section-title">⬆️ 设施升级</div>
            <div class="upgrades-grid" id="upgradesGrid"></div>
        </div>

        <!-- 游戏说明 -->
        <div class="game-info">
            💡 提示：调整价格吸引顾客 → 进货补充库存 → 升级设施提升效率
            <br>
            📢 事件系统已启用，留意右上角通知！
        </div>
    </div>

    <script>
        // ============ 游戏状态 ============
        const gameState = {
            gold: 100,
            revenue: 0,
            level: 1,
            products: [
                { id: 1, name: '饮料', icon: '🥤', basePrice: 10, stock: 10, cost: 5, profitRate: 0.3 },
                { id: 2, name: '零食', icon: '🍪', basePrice: 8, stock: 10, cost: 4, profitRate: 0.25 },
                { id: 3, name: '日用品', icon: '🧴', basePrice: 6, stock: 10, cost: 3, profitRate: 0.2 }
            ],
            customers: [],
            queue: [],
            upgrades: {
                register: 1,
                shelf: 1
            }
        };

        // ============ 事件系统 ============
        const events = {
            // 常规事件
            customer_complaint: {
                id: 'customer_complaint',
                type: 'regular',
                name: '顾客投诉',
                icon: '😠',
                color: '#2196F3',
                description: '一位顾客在排队时因为等待时间过长而生气离开了',
                duration: 60000,
                cooldown: 300000,
                triggerCondition: () => {
                    return gameState.queue.length > 4 &&
                           gameState.queue.some(c => c.state === 'waiting' && c.timer >= 5000) &&
                           gameState.upgrades.register < 2;
                },
                effects: {
                    satisfaction: -30,
                    customersLost: 1,
                    churnRate: 0.1
                },
                strategies: [
                    { name: '升级收银台', action: 'upgrade_register', cost: 100, icon: '🛒' },
                    { name: '优化排队管理', action: 'optimize_queue', cost: 50, icon: '📋' },
                    { name: '增加收银员', action: 'add_cashier', cost: 200, icon: '👤' }
                ]
            },

            product_out_of_stock: {
                id: 'product_out_of_stock',
                type: 'regular',
                name: '商品缺货',
                icon: '📦',
                color: '#FF9800',
                description: '热门商品被抢购一空，顾客无法购买',
                duration: 300000,
                cooldown: 300000,
                triggerCondition: () => {
                    const hasStock = gameState.products.some(p => p.stock > 0);
                    return !hasStock && gameState.revenue > 0;
                },
                effects: {
                    revenue: 0.8,
                    satisfaction: -15,
                    churnRate: 0.05
                },
                strategies: [
                    { name: '紧急进货', action: 'emergency_restock', cost: 100, icon: '📦' },
                    { name: '调整价格', action: 'adjust_price', cost: 0, icon: '💰' },
                    { name: '推荐替代商品', action: 'recommend_alternatives', cost: 0, icon: '💡' }
                ]
            },

            weather_change: {
                id: 'weather_change',
                type: 'regular',
                name: '天气变化',
                icon: '🌧️',
                color: '#2196F3',
                description: '今天下起了大雨，外出购物的人减少了',
                duration: 600000,
                cooldown: 600000,
                triggerCondition: () => {
                    return Math.random() < 0.3 && gameState.revenue > 0;
                },
                effects: {
                    customerFlow: 0.7,
                    vipCustomers: 0.8
                },
                strategies: [
                    { name: '调整进货量', action: 'adjust_inventory', cost: 0, icon: '📦' },
                    { name: '增加促销活动', action: 'promote', cost: 50, icon: '📢' },
                    { name: '优化线上推广', action: 'online_promote', cost: 100, icon: '🌐' }
                ]
            },

            promotional_activity: {
                id: 'promotional_activity',
                type: 'regular',
                name: '促销活动',
                icon: '🎉',
                color: '#FF9800',
                description: '顾客对折扣商品表现出极大兴趣',
                duration: 600000,
                cooldown: 600000,
                triggerCondition: () => {
                    return gameState.level >= 3 && Math.random() < 0.2;
                },
                effects: {
                    revenue: 1.25,
                    satisfaction: 10,
                    goldReward: 50
                },
                strategies: [
                    { name: '抓住机会', action: 'capitalize', cost: 0, icon: '💰' }
                ]
            },

            register_malfunction: {
                id: 'register_malfunction',
                type: 'regular',
                name: '收银台故障',
                icon: '🔧',
                color: '#F44336',
                description: '收银台出现故障，服务速度降低',
                duration: 120000,
                cooldown: 600000,
                triggerCondition: () => {
                    return gameState.upgrades.register < 3 && Math.random() < 0.1;
                },
                effects: {
                    serviceSpeed: 0.6,
                    satisfaction: -20
                },
                strategies: [
                    { name: '维修收银台', action: 'repair_register', cost: 150, icon: '🔧' },
                    { name: '增加收银员', action: 'add_cashier', cost: 200, icon: '👤' },
                    { name: '临时升级', action: 'upgrade_register', cost: 100, icon: '🛒' }
                ]
            }
        };

        // 事件系统实例
        const eventSystem = {
            activeEvents: [],
            eventCooldowns: {},
            eventHistory: [],

            // 注册事件
            registerEvent(event) {
                events[event.id] = event;
            },

            // 触发事件
            triggerEvent(eventId) {
                const event = events[eventId];

                // 检查冷却时间
                if (this.eventCooldowns[eventId] > 0) {
                    return false;
                }

                // 检查触发条件
                if (!event.triggerCondition()) {
                    return false;
                }

                // 创建事件实例
                const eventInstance = {
                    ...event,
                    id: eventId,
                    startTime: Date.now(),
                    endTime: Date.now() + event.duration,
                    status: 'active'
                };

                this.activeEvents.push(eventInstance);
                this.eventCooldowns[eventId] = event.cooldown;

                // 通知玩家
                this.showEventNotification(eventInstance);

                // 应用事件效果
                this.applyEventEffects(event);

                return true;
            },

            // 显示事件通知
            showEventNotification(event) {
                const notificationBar = document.getElementById('eventNotificationBar');
                document.getElementById('eventIcon').textContent = event.icon;
                document.getElementById('eventIcon').style.color = event.color;
                document.getElementById('eventTitle').textContent = event.name;
                document.getElementById('eventDescription').textContent = event.description;

                notificationBar.classList.add('show');
                notificationBar.classList.add('animate-slideInRight');

                // 显示事件详情对话框
                this.showEventDialog(event);

                // 更新计时器
                this.updateEventTimer(event);
            },

            // 显示事件详情对话框
            showEventDialog(event) {
                const dialog = document.getElementById('eventDialog');
                const typeColors = {
                    regular: '#2196F3',
                    special: '#FF9800',
                    challenge: '#F44336'
                };

                document.getElementById('eventType').textContent = event.type + '事件';
                document.getElementById('eventType').style.color = typeColors[event.type];
                document.getElementById('eventDialogIcon').textContent = event.icon;
                document.getElementById('eventDialogIcon').style.color = event.color;
                document.getElementById('eventDialogTitle').textContent = event.name;
                document.getElementById('eventDialogDescription').textContent = event.description;

                // 显示影响
                const effectsList = document.getElementById('eventEffects');
                effectsList.innerHTML = '';
                for (const [key, value] of Object.entries(event.effects)) {
                    const li = document.createElement('li');
                    if (key === 'revenue') {
                        li.textContent = `营业额 ${value >= 1 ? '+' : ''}${(value * 100 - 100).toFixed(0)}%`;
                    } else if (key === 'customerFlow') {
                        li.textContent = `顾客流量 ${value >= 1 ? '+' : ''}${(value * 100 - 100).toFixed(0)}%`;
                    } else if (key === 'serviceSpeed') {
                        li.textContent = `服务速度 ${value >= 1 ? '+' : ''}${(value * 100 - 100).toFixed(0)}%`;
                    } else if (typeof value === 'number' && value < 0) {
                        li.textContent = `${key} ${value}`;
                    } else {
                        li.textContent = `${key} ${value >= 1 ? '+' : ''}${value}`;
                    }
                    effectsList.appendChild(li);
                }

                // 显示应对策略
                const strategiesDiv = document.getElementById('eventStrategies');
                strategiesDiv.innerHTML = '';
                event.strategies.forEach((strategy, index) => {
                    const item = document.createElement('div');
                    item.className = 'strategy-item';
                    item.innerHTML = `
                        <div class="strategy-name">${strategy.icon} ${strategy.name}</div>
                        <div class="strategy-cost">花费: $${strategy.cost}</div>
                    `;
                    item.onclick = () => this.applyStrategy(event.id, index);
                    strategiesDiv.appendChild(item);
                });

                dialog.classList.add('show');
            },

            // 更新事件计时器
            updateEventTimer(event) {
                const timer = document.getElementById('eventTimer');
                const update = () => {
                    if (!this.activeEvents.find(e => e.id === event.id)) {
                        return;
                    }

                    const remaining = event.endTime - Date.now();
                    if (remaining <= 0) {
                        this.endEvent(event);
                        return;
                    }

                    const minutes = Math.floor(remaining / 60000);
                    const seconds = Math.floor((remaining % 60000) / 1000);
                    timer.textContent = `剩余时间: ${minutes}分${seconds}秒`;
                };

                this.timerInterval = setInterval(update, 1000);
            },

            // 应用事件效果
            applyEventEffects(event) {
                for (const [key, value] of Object.entries(event.effects)) {
                    if (key === 'revenue') {
                        gameState.revenue *= value;
                    } else if (key === 'customerFlow') {
                        // 影响顾客生成频率
                        gameState.customerFlowMultiplier = value;
                    } else if (key === 'serviceSpeed') {
                        gameState.serviceSpeedMultiplier = value;
                    } else if (key === 'satisfaction') {
                        gameState.satisfaction = (gameState.satisfaction || 100) + value;
                    } else if (key === 'vipCustomers') {
                        gameState.vipCustomerMultiplier = value;
                    } else if (key === 'goldReward') {
                        gameState.gold += value;
                    } else if (key === 'goldLoss') {
                        gameState.gold = Math.max(0, gameState.gold - value);
                    }
                }

                updateStats();
            },

            // 应用应对策略
            applyStrategy(eventId, strategyIndex) {
                const event = events[eventId];
                const strategy = event.strategies[strategyIndex];

                switch (strategy.action) {
                    case 'upgrade_register':
                        if (gameState.gold >= strategy.cost) {
                            gameState.gold -= strategy.cost;
                            gameState.upgrades.register++;
                            showMessage(`${strategy.icon} ${strategy.name}成功！收银台 Lv.${gameState.upgrades.register}`);
                        } else {
                            showMessage('金币不足！');
                        }
                        break;

                    case 'add_cashier':
                        if (gameState.gold >= strategy.cost) {
                            gameState.gold -= strategy.cost;
                            showMessage(`${strategy.icon} ${strategy.name}成功！`);
                        } else {
                            showMessage('金币不足！');
                        }
                        break;

                    case 'emergency_restock':
                        if (gameState.gold >= strategy.cost) {
                            gameState.gold -= strategy.cost;
                            gameState.products.forEach(p => p.stock += 5);
                            showMessage(`${strategy.icon} ${strategy.name}成功！库存增加`);
                        } else {
                            showMessage('金币不足！');
                        }
                        break;

                    case 'adjust_price':
                        showMessage(`${strategy.icon} ${strategy.name}成功！`);
                        break;

                    case 'recommend_alternatives':
                        showMessage(`${strategy.icon} ${strategy.name}成功！`);
                        break;

                    case 'adjust_inventory':
                        showMessage(`${strategy.icon} ${strategy.name}成功！`);
                        break;

                    case 'promote':
                        if (gameState.gold >= strategy.cost) {
                            gameState.gold -= strategy.cost;
                            showMessage(`${strategy.icon} ${strategy.name}成功！`);
                        } else {
                            showMessage('金币不足！');
                        }
                        break;

                    case 'online_promote':
                        if (gameState.gold >= strategy.cost) {
                            gameState.gold -= strategy.cost;
                            showMessage(`${strategy.icon} ${strategy.name}成功！`);
                        } else {
                            showMessage('金币不足！');
                        }
                        break;

                    case 'repair_register':
                        if (gameState.gold >= strategy.cost) {
                            gameState.gold -= strategy.cost;
                            gameState.upgrades.register++;
                            showMessage(`${strategy.icon} ${strategy.name}成功！收银台 Lv.${gameState.upgrades.register}`);
                        } else {
                            showMessage('金币不足！');
                        }
                        break;

                    case 'capitalize':
                        showMessage(`${strategy.icon} ${strategy.name}成功！`);
                        break;
                }

                renderProducts();
                renderUpgrades();
                updateStats();
                closeEventDialog();
            },

            // 自动解决事件
            applyAutoStrategy() {
                const event = events[Object.keys(events).find(id => {
                    const instance = this.activeEvents.find(e => e.id === id);
                    return instance && instance.status === 'active';
                })];

                if (event && event.strategies.length > 0) {
                    this.applyStrategy(event.id, 0);
                } else {
                    closeEventDialog();
                }
            },

            // 结束事件
            endEvent(event) {
                event.status = 'ended';
                this.eventHistory.push(event);

                // 隐藏通知栏
                document.getElementById('eventNotificationBar').classList.remove('show');
                document.getElementById('eventTimer').textContent = '';

                // 添加到事件日志
                this.addToEventLog(event);

                // 清除计时器
                if (this.timerInterval) {
                    clearInterval(this.timerInterval);
                }
            },

            // 添加到事件日志
            addToEventLog(event) {
                const logItems = document.getElementById('eventLogItems');
                const logCount = document.getElementById('eventLogCount');

                const item = document.createElement('div');
                item.className = `event-log-item ${event.type}`;
                item.innerHTML = `
                    <div class="event-name">${event.icon} ${event.name}</div>
                    <div class="event-time">${new Date().toLocaleTimeString()}</div>
                `;

                logItems.insertBefore(item, logItems.firstChild);
                logCount.textContent = this.eventHistory.length;
            },

            // 检查并触发事件
            checkAndTriggerEvents() {
                for (const eventId in events) {
                    this.triggerEvent(eventId);
                }
            },

            // 更新事件状态
            updateEvents() {
                const now = Date.now();

                for (let i = this.activeEvents.length - 1; i >= 0; i--) {
                    const event = this.activeEvents[i];

                    if (now >= event.endTime) {
                        this.endEvent(event);
                        this.activeEvents.splice(i, 1);
                    }
                }

                // 更新冷却时间
                for (const eventId in this.eventCooldowns) {
                    this.eventCooldowns[eventId] -= 3000;
                }
            }
        };

        // ============ 顾客类型 ============
        const customerTypes = [
            { name: '普通顾客', icon: '😊', minPrice: 5, maxPrice: 20, waitTime: 5000, priority: 1 },
            { name: 'VIP顾客', icon: '👑', minPrice: 20, maxPrice: 50, waitTime: 8000, priority: 3 },
            { name: '急切顾客', icon: '😰', minPrice: 10, maxPrice: 30, waitTime: 3000, priority: 2 }
        ];

        // ============ 游戏初始化 ============
        function init() {
            renderShelves();
            renderProducts();
            renderUpgrades();
            updateStats();

            // 初始化事件系统
            eventSystem.initialize();

            // 启动事件触发器
            eventSystem.startEventTrigger();

            // 定时生成顾客
            setInterval(() => {
                if (gameState.queue.length < 8 && Math.random() < 0.5) {
                    generateCustomer();
                }
            }, 5000);

            // 游戏循环
            setInterval(gameLoop, 1000);

            showMessage('游戏开始！调整价格、进货、升级设施');
        }

        // ============ 渲染函数 ============
        function renderShelves() {
            for (let i = 1; i <= 3; i++) {
                const shelf = document.getElementById(`shelf${i}`);
                shelf.innerHTML = '';
                for (let j = 0; j < 4; j++) {
                    const item = document.createElement('div');
                    item.className = 'shelf-item';
                    item.style.background = `hsl(${Math.random() * 360}, 70%, 60%)`;
                    item.style.color = 'white';
                    item.textContent = ['🥤', '🍪', '🧴'][Math.floor(Math.random() * 3)];
                    shelf.appendChild(item);
                }
            }
        }

        function renderProducts() {
            const container = document.getElementById('productsGrid');
            container.innerHTML = '';

            gameState.products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="product-name">${product.icon} ${product.name}</div>
                    <div class="product-stock">库存: ${product.stock}</div>
                    <div class="product-price">$${product.basePrice}</div>
                    <div class="product-controls">
                        <button class="btn btn-down" onclick="changePrice(${product.id}, -1)">价格 ↓</button>
                        <button class="btn btn-up" onclick="changePrice(${product.id}, 1)">价格 ↑</button>
                        <button class="btn btn-add" onclick="addStock(${product.id})">进货</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function renderUpgrades() {
            const container = document.getElementById('upgradesGrid');
            container.innerHTML = '';

            const upgrades = [
                { id: 'register', name: '收银台', icon: '🛒', baseCost: 500, effect: '提升服务速度' },
                { id: 'shelf', name: '货架', icon: '📦', baseCost: 300, effect: '增加库存上限' }
            ];

            upgrades.forEach(upgrade => {
                const cost = upgrade.baseCost * gameState.upgrades[upgrade.id];
                const card = document.createElement('div');
                card.className = 'upgrade-card';
                card.innerHTML = `
                    <div class="upgrade-icon">${upgrade.icon}</div>
                    <div class="upgrade-name">${upgrade.name}</div>
                    <div class="upgrade-level">Lv.${gameState.upgrades[upgrade.id]}</div>
                    <div class="upgrade-cost">升级: $${cost}</div>
                    <button class="btn btn-upgrade" onclick="upgrade('${upgrade.id}')">升级</button>
                `;
                container.appendChild(card);
            });
        }

        function updateStats() {
            document.getElementById('gold').textContent = gameState.gold;
            document.getElementById('revenue').textContent = gameState.revenue.toFixed(0);
            document.getElementById('level').textContent = gameState.level;
            document.getElementById('queueLength').textContent = gameState.queue.length;
        }

        function closeEventDialog() {
            document.getElementById('eventDialog').classList.remove('show');
        }

        // ============ 游戏逻辑 ============
        function changePrice(productId, delta) {
            const product = gameState.products.find(p => p.id === productId);
            if (product) {
                product.basePrice = Math.max(1, product.basePrice + delta);
                renderProducts();
                showMessage(`${product.name} 价格: $${product.basePrice}`);
            }
        }

        function addStock(productId) {
            const product = gameState.products.find(p => p.id === productId);
            if (product) {
                const cost = Math.floor(product.cost * gameState.upgrades.shelf);
                if (gameState.gold >= cost) {
                    gameState.gold -= cost;
                    product.stock += 5;
                    showMessage(`${product.name} 进货成功！花费 $${cost}`);
                    renderProducts();
                    updateStats();
                } else {
                    showMessage('金币不足！');
                }
            }
        }

        function upgrade(type) {
            const baseCost = type === 'register' ? 500 : 300;
            const currentLevel = gameState.upgrades[type];
            const cost = baseCost * currentLevel;

            if (gameState.gold >= cost) {
                gameState.gold -= cost;
                gameState.upgrades[type]++;
                showMessage(`升级成功！${type === 'register' ? '收银台' : '货架'} Lv.${gameState.upgrades[type]}`);
                renderUpgrades();
                updateStats();
            } else {
                showMessage('金币不足！');
            }
        }

        function generateCustomer() {
            if (gameState.queue.length >= 8) {
                showMessage('排队已满，请升级货架！');
                return;
            }

            // VIP顾客概率
            const vipChance = gameState.vipCustomerMultiplier || 1;
            const vipIndex = Math.floor(Math.random() * customerTypes.length);
            const type = customerTypes[Math.floor(Math.random() * customerTypes.length)];

            const customer = {
                id: Date.now(),
                ...type,
                x: 0,
                y: 0,
                state: 'waiting',
                timer: 0
            };

            gameState.queue.push(customer);
            renderQueue();
            showMessage(`${customer.name} 加入排队！`);
        }

        function renderQueue() {
            const queueArea = document.getElementById('queueArea');
            const oldCustomers = queueArea.querySelectorAll('.customer');
            oldCustomers.forEach(c => c.remove());

            gameState.queue.forEach((customer, index) => {
                const customerEl = document.createElement('div');
                customerEl.className = `customer ${customer.name === 'VIP顾客' ? 'vip' : customer.name === '急切顾客' ? 'urgent' : ''}`;
                customerEl.innerHTML = `
                    <div class="customer-name">${customer.icon} ${customer.name}</div>
                    ${customer.state === 'waiting' ? '<div class="customer-waiting">⏳</div>' : ''}
                `;
                customerEl.style.left = `${10 + index * 35}px`;
                customerEl.style.top = `${50 + (customer.state === 'served' ? 30 : 0)}px`;
                customerEl.style.opacity = customer.state === 'served' ? '0.5' : '1';
                queueArea.appendChild(customerEl);
            });
        }

        function customerBehavior() {
            gameState.queue.forEach(customer => {
                if (customer.state === 'waiting') {
                    customer.timer += 1000;
                    if (customer.timer >= customer.waitTime) {
                        customer.state = 'leaving';
                        showMessage(`${customer.name} 等太久离开了！`);
                        renderQueue();
                    }
                }
            });

            const servedCustomer = gameState.queue.find(c => c.state === 'waiting');
            if (servedCustomer) {
                servedCustomer.state = 'served';
                serveCustomer(servedCustomer);
                renderQueue();
            }
        }

        function serveCustomer(customer) {
            const products = gameState.products.filter(p => p.stock > 0);
            if (products.length === 0) {
                customer.state = 'leaving';
                showMessage(`${customer.name} 没有商品可买，离开了！`);
                renderQueue();
                return;
            }

            const product = products[Math.floor(Math.random() * products.length)];
            const price = product.basePrice;

            if (price >= customer.minPrice && price <= customer.maxPrice) {
                product.stock--;
                const revenue = price;
                gameState.gold += revenue;
                gameState.revenue += revenue;
                showMessage(`${customer.name} 购买了 ${product.icon} ${product.name}，获得 $${revenue}`);

                gameState.queue = gameState.queue.filter(c => c.id !== customer.id);

                if (gameState.revenue >= gameState.level * 1000) {
                    gameState.level++;
                    showMessage(`🎉 升级！当前等级: ${gameState.level}`);
                }

                renderQueue();
                renderProducts();
                updateStats();
            } else {
                customer.state = 'leaving';
                showMessage(`${customer.name} 觉得价格不合适，离开了！`);
                renderQueue();
            }
        }

        function showMessage(text) {
            const message = document.getElementById('message');
            message.textContent = text;
            message.classList.add('show');
            message.classList.remove('hide');

            setTimeout(() => {
                message.classList.remove('show');
                message.classList.add('hide');
            }, 2000);
        }

        function gameLoop() {
            customerBehavior();
            updateStats();
        }

        // 启动游戏
        init();
    </script>
</body>
</html>
